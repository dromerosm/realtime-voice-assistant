services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_REALTIME_MODEL: "${OPENAI_REALTIME_MODEL:-gpt-realtime-1.5}"
      OPENAI_REALTIME_VOICE: "${OPENAI_REALTIME_VOICE:-marin}"
      OPENAI_REALTIME_TRANSCRIPTION_MODEL: "${OPENAI_REALTIME_TRANSCRIPTION_MODEL:-gpt-4o-mini-transcribe}"
      OPENAI_REALTIME_INSTRUCTIONS: "${OPENAI_REALTIME_INSTRUCTIONS:-You are a concise real-time voice assistant. Remember user details during the current session.}"
      OPENAI_REALTIME_CLIENT_SECRET_TTL_SECONDS: "${OPENAI_REALTIME_CLIENT_SECRET_TTL_SECONDS:-120}"
      OPENAI_REALTIME_TOKEN_RATE_LIMIT_WINDOW_MS: "${OPENAI_REALTIME_TOKEN_RATE_LIMIT_WINDOW_MS:-60000}"
      OPENAI_REALTIME_TOKEN_RATE_LIMIT_MAX_REQUESTS: "${OPENAI_REALTIME_TOKEN_RATE_LIMIT_MAX_REQUESTS:-5}"
      OPENAI_REALTIME_ALLOWED_ORIGINS: "${OPENAI_REALTIME_ALLOWED_ORIGINS:-http://localhost:3001}"
      TURNSTILE_SITE_KEY: "${TURNSTILE_SITE_KEY:-}"
      TURNSTILE_SECRET_KEY: "${TURNSTILE_SECRET_KEY:-}"
      OPENAI_MEMORY_ENABLED: "${OPENAI_MEMORY_ENABLED:-true}"
      OPENAI_MEMORY_MODEL: "${OPENAI_MEMORY_MODEL:-gpt-5-mini}"
      MEMORY_DB_PATH: "${MEMORY_DB_PATH:-/data/memory.sqlite}"
      MEMORY_ADMIN_TOKEN: "${MEMORY_ADMIN_TOKEN:-}"
      ADMIN_SESSION_TTL_SECONDS: "${ADMIN_SESSION_TTL_SECONDS:-43200}"
      ADMIN_SESSION_SECRET: "${ADMIN_SESSION_SECRET:-}"
    volumes:
      - memory-data:/data
    ports:
      - "${APP_PORT:-3001}:3000"
    restart: unless-stopped

volumes:
  memory-data:
